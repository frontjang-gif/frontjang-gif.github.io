<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebRTC P2P Relay</title>
<style>
body { font-family: monospace; max-width: 800px; margin: 20px auto; background: #1a1a1a; color: #eee; }
textarea, input, button { font-family: monospace; font-size: 14px; }
button { background: #333; color: #eee; border: 1px solid #555; padding: 8px 16px; cursor: pointer; margin: 4px; }
button:hover { background: #555; }
input { background: #222; color: #eee; border: 1px solid #444; padding: 6px; width: 300px; }
#log { white-space: pre-wrap; background: #111; padding: 10px; border: 1px solid #333; height: 300px; overflow-y: auto; }
.section { margin: 16px 0; padding: 12px; border: 1px solid #333; }
h3 { margin: 4px 0; color: #aaa; }
</style>
</head>
<body>
<h2>WebRTC P2P Relay (Etherpad Signaling)</h2>

<div class="section">
<h3>Config</h3>
<label>Secret Key: </label><input id="secret" type="password" placeholder="shared secret key">
<br><br>
<label>Role: </label>
<button onclick="start('A')">Machine A (Create Offer)</button>
<button onclick="start('B')">Machine B (Wait for Offer)</button>
</div>

<div class="section">
<h3>Messages</h3>
<input id="msg" placeholder="Type message..." size="50" onkeydown="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">Send</button>
</div>

<div class="section">
<h3>Log</h3>
<div id="log"></div>
</div>

<script>
const PAD_ID = 'ZOxYQ9aGs_8304EjYoBC';
const API_BASE = 'https://pad-dev.etherpad.org/api/1.2.15';
const API_KEY = '3411827b03f240ae09dd977ddff8736973252f50cf293ea6ab9ba3fb39438009';
const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

let pc, dc, role, pollTimer;
const log = m => { const el = document.getElementById('log'); el.textContent += m + '\n'; el.scrollTop = el.scrollHeight; };

// --- Encryption ---
async function getKey() {
  const secret = document.getElementById('secret').value;
  if (!secret) { alert('Enter secret key first'); throw 'no key'; }
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(secret), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: enc.encode('webrtc-relay-salt'), iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

async function encrypt(text) {
  const key = await getKey();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(text));
  return btoa(String.fromCharCode(...iv) + String.fromCharCode(...new Uint8Array(ct)));
}

async function decrypt(b64) {
  const key = await getKey();
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = raw.slice(0, 12);
  const ct = raw.slice(12);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}

// --- Etherpad API ---
async function padWrite(content) {
  await fetch(`${API_BASE}/setText?apikey=${API_KEY}&padID=${PAD_ID}&text=${encodeURIComponent(content)}`);
}

async function padRead() {
  const res = await fetch(`${API_BASE}/getText?apikey=${API_KEY}&padID=${PAD_ID}`);
  const json = await res.json();
  return (json.data && json.data.text) ? json.data.text.trim() : '';
}

// --- Signaling via Etherpad ---
async function writeSignal(label, data) {
  const encrypted = await encrypt(JSON.stringify(data));
  const current = await padRead();
  const lines = current ? current.split('\n') : [];
  const idx = lines.findIndex(l => l.startsWith(label + ':'));
  const entry = label + ':' + encrypted;
  if (idx >= 0) lines[idx] = entry; else lines.push(entry);
  await padWrite(lines.join('\n'));
}

async function readSignal(label) {
  const text = await padRead();
  const line = text.split('\n').find(l => l.startsWith(label + ':'));
  if (!line) return null;
  const payload = line.substring(label.length + 1);
  try { return JSON.parse(await decrypt(payload)); } catch { return null; }
}

// --- WebRTC ---
function setupPC() {
  pc = new RTCPeerConnection(ICE);
  pc.onicecandidate = async e => {
    if (!e.candidate) {
      const label = role === 'A' ? 'OFFER' : 'ANSWER';
      await writeSignal(label, pc.localDescription);
      log('✓ ' + label + ' written to pad (encrypted)');
    }
  };
  pc.onconnectionstatechange = () => {
    log('Connection: ' + pc.connectionState);
    if (pc.connectionState === 'connected' && pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  };
}

function setupDC(channel) {
  dc = channel;
  dc.onopen = () => log('✓ DataChannel OPEN — send messages!');
  dc.onclose = () => log('✗ DataChannel closed');
  dc.onmessage = e => log('← ' + e.data);
}

async function start(r) {
  role = r;
  await getKey();
  if (role === 'A') await padWrite('');
  setupPC();

  if (role === 'A') {
    const channel = pc.createDataChannel('relay');
    setupDC(channel);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    log('Machine A: creating offer...');
    pollTimer = setInterval(async () => {
      const answer = await readSignal('ANSWER');
      if (answer) { await pc.setRemoteDescription(answer); log('✓ Got answer — connecting...'); clearInterval(pollTimer); pollTimer = null; }
    }, 2000);
  } else {
    pc.ondatachannel = e => setupDC(e.channel);
    log('Machine B: waiting for offer...');
    pollTimer = setInterval(async () => {
      const offer = await readSignal('OFFER');
      if (offer) {
        clearInterval(pollTimer); pollTimer = null;
        await pc.setRemoteDescription(offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        log('Machine B: got offer, creating answer...');
      }
    }, 2000);
  }
}

function sendMsg() {
  const input = document.getElementById('msg');
  if (!dc || dc.readyState !== 'open') { log('Not connected yet'); return; }
  log('→ ' + input.value);
  dc.send(input.value);
  input.value = '';
}
</script>
</body>
</html>
