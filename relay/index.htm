<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebRTC P2P Relay</title>
<style>
body { font-family: monospace; max-width: 800px; margin: 20px auto; background: #1a1a1a; color: #eee; }
#log { white-space: pre-wrap; background: #111; padding: 10px; border: 1px solid #333; height: 400px; overflow-y: auto; }
.section { margin: 16px 0; padding: 12px; border: 1px solid #333; }
input { background: #222; color: #eee; border: 1px solid #444; padding: 6px; }
button { background: #333; color: #eee; border: 1px solid #555; padding: 8px 16px; cursor: pointer; }
</style>
</head>
<body>
<h2>WebRTC P2P Relay</h2>
<div class="section">
<label>WS Port: </label><input id="wsport" value="9000" size="6">
<button onclick="connect()">Connect to Bridge</button>
</div>
<div class="section"><div id="log"></div></div>

<script>
const ICE = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun.relay.metered.ca:80' },
  { urls: 'turn:relay1.expressturn.com:3478', username: 'efLNIU5GZJ4V0HHK6Y', credential: 'lOSdXaEkT2f93H8p' },
  { urls: 'turns:relay1.expressturn.com:5349', username: 'efLNIU5GZJ4V0HHK6Y', credential: 'lOSdXaEkT2f93H8p' },
]};
let pc, dc, ws;
const log = m => { const el = document.getElementById('log'); el.textContent += m + '\n'; el.scrollTop = el.scrollHeight; };

function connect() {
  const port = document.getElementById('wsport').value;
  ws = new WebSocket(`ws://127.0.0.1:${port}`);
  ws.onopen = () => log('[WS] Connected to Python bridge');
  ws.onclose = () => log('[WS] Disconnected');
  ws.onmessage = async e => {
    const msg = e.data;
    if (msg === 'CMD:CREATE_OFFER') {
      await createOffer();
    } else if (msg.startsWith('CMD:SET_ANSWER:')) {
      const sdp = JSON.parse(msg.substring(15));
      await pc.setRemoteDescription(sdp);
      log('[WebRTC] Remote answer set');
    } else if (msg.startsWith('CMD:SET_OFFER:')) {
      const sdp = JSON.parse(msg.substring(14));
      await acceptOffer(sdp);
    } else {
      // Data message -> send via WebRTC
      if (dc && dc.readyState === 'open') dc.send(msg);
    }
  };
}

function setupDC(channel) {
  dc = channel;
  dc.onopen = () => log('✓ DataChannel OPEN');
  dc.onclose = () => log('✗ DataChannel closed');
  dc.onmessage = e => {
    log('[←] ' + e.data.substring(0, 80));
    if (ws && ws.readyState === 1) ws.send(e.data);
  };
}

async function createOffer() {
  pc = new RTCPeerConnection(ICE);
  pc.oniceconnectionstatechange = () => log('[ICE] ' + pc.iceConnectionState);
  const channel = pc.createDataChannel('relay');
  setupDC(channel);

  pc.onicecandidate = e => {
    if (!e.candidate) {
      // All candidates gathered - send complete offer to Python
      ws.send('SIG:' + JSON.stringify(pc.localDescription));
      log('[WebRTC] Offer sent to bridge');
    }
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  log('[WebRTC] Creating offer...');
}

async function acceptOffer(sdp) {
  pc = new RTCPeerConnection(ICE);
  pc.oniceconnectionstatechange = () => log('[ICE] ' + pc.iceConnectionState);
  pc.ondatachannel = e => setupDC(e.channel);

  pc.onicecandidate = e => {
    if (!e.candidate) {
      ws.send('SIG:' + JSON.stringify(pc.localDescription));
      log('[WebRTC] Answer sent to bridge');
    }
  };
  await pc.setRemoteDescription(sdp);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  log('[WebRTC] Answer created...');
}
</script>
</body>
</html>
